<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv='cache-control' content='no-cache'>
<meta http-equiv='expires' content='0'>
<meta http-equiv='pragma' content='no-cache'>
<style>
body {
    margin: 0;
}
canvas {
    border:1px solid #d3d3d3;
    background-color: #f1f1f1;
}
</style>
</head>
<body onload="startGame()">
<script>
function getOrientationPermission()  {
  if (typeof DeviceOrientationEvent.requestPermission !== "function") {
    return;
  }

  const permission = DeviceOrientationEvent.requestPermission(true);
  if (permission === "granted") {
    window.addEventListener("deviceorientationabsolute", (event) => {
      console.log('Absolute alpha: ${event.alpha}');
    })
  }
}
	
var myGamePiece;

function startGame() {
	//var myScreenOrientation = window.screen.orientation;
	//myScreenOrientation.lock("portrait");
    myGamePiece = new component(30, 30, "red", 10, 120);          
    myGameArea.start();
	myGameArea.x = 100;
	myGameArea.y = 100;
}


var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
		this.erase = true;
        this.canvas.width = 300;
        this.canvas.height = 270;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.interval = setInterval(updateGameArea, 20);
        window.addEventListener('mousemove', function (e) {
      		myGameArea.x = e.pageX;
      		myGameArea.y = e.pageY;
    	})
		window.addEventListener('mousedown', function (e) {
			myGameArea.erase = !myGameArea.erase;
		})
    }, 
    clear : function(){
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function component(width, height, color, x, y) {
    this.width = width;
    this.height = height;
    this.speedX = 0;
    this.speedY = 0;
    this.x = x;
    this.y = y;    
	this.angle = 0;
    this.update = function()  {
        ctx = myGameArea.context;
        ctx.save();
        ctx.translate(this.x, this.y);        
        ctx.rotate(this.angle);
		// Create linear gradient
		const grad = ctx.createLinearGradient(0,0, 20,0);
		grad.addColorStop(0, "orange");
		grad.addColorStop(1, "red");

		// Fill rectangle with gradient
		ctx.fillStyle = grad;
        ctx.fillRect(this.width / -2, this.height / -2, this.width, this.height);     
        ctx.fillStyle = color;
		
        ctx.restore();
		this.x += this.speedX;
		this.y += this.speedY;
    }
    this.clicked = function() {
        var myleft = this.x;
        var myright = this.x + (this.width);
        var mytop = this.y;
        var mybottom = this.y + (this.height);
        var clicked = true;
        if ((mybottom < myGameArea.y) || (mytop > myGameArea.y) || (myright < myGameArea.x) || (myleft > myGameArea.x)) {
            clicked = false;
        }
        return clicked;
    }
}

function updateGameArea() {
	if (myGameArea.erase)
		myGameArea.clear();
    if (myGameArea.x && myGameArea.y) {
		//update x and y based on distance from object to cursor
		var deltaX = myGamePiece.x - myGameArea.x;
		var deltaY = myGamePiece.y - myGameArea.y;
		var angle = Math.atan(deltaY / deltaX);
		if (deltaX < 0) {
			angle += Math.PI;
		}
        myGamePiece.speedX = (myGameArea.x - myGamePiece.x) / 5;
        myGamePiece.speedY = (myGameArea.y - myGamePiece.y) / 5;

		//update x and y based on orientation
		myGameArea.x += myGameArea.orientationX / 100;
		myGameArea.y += myGameArea.orientationY / 100;
    }
    myGamePiece.angle = angle;                          
    myGamePiece.update();
	
	var ctx = myGameArea.context;
	ctx.font = "14px Arial";
	ctx.fillText("x is " + Math.round(orientationX,2).toString(), 10, 10);
	ctx.fillText("y is " + Math.round(orientationY,2).toString(), 10, 30);
	ctx.fillText("mouseX is " + Math.round(myGameArea.x,2).toString(), 10, 50);
	ctx.fillText("mousey is " + Math.round(myGameArea.y,2).toString(), 10, 70);
}

function handleOrientation(event) {
	myGameArea.orientationX = event.gamma; // In degree in the range [-90,90)
	myGameArea.orientationY = event.beta; // In degree in the range [-180,180)
}

window.addEventListener("deviceorientation", handleOrientation);

</script>

<p>The square follows your mouse.  Try a click.</p>
	
<button id="butt1" type="button" onclick="getOrientationPermission()">Click me.</button>
	
</body>
</html>
